!
hostname CORE_B
!
interface e0
 description ##_OOB_MGMT_INTERFACE_##
 no switchport
 ip address dhcp
!
ip domain-name lab.local
!
username admin privilege 15 secret Chelse*71858465
username adminsos privilege 15 secret Chelse*71858465
!
ip ssh version 2
!
line vty 0 4
 transport input ssh
 transport output ssh
 login local
!
event manager applet GENERATE-SSH-KEYS
 event timer countdown time 1
 action 01.0 cli command "enable"
 action 02.0 cli command "configure terminal"
 action 03.0 cli command "crypto key generate rsa modulus 2048"
 action 04.0 cli command "end"
 action 05.0 cli command "write memory"
 action 06.0 syslog msg "SSH keys have been generated successfully by EEM."
!
