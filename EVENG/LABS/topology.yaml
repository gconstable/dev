# topology.yaml
lab:
  name: "Jenkins_Auto_Lab"
  description: "Lab created via Jenkins CI/CD"
  path: "/"

nodes:
  - name: R1
    template: cat9kv
    image: cat9kv-17.15.01
    left: 100
    top: 100
  - name: R2
    template: cat9kv
    image: cat9kv-17.15.01
    left: 300
    top: 100

links:
  - source: R1
    src_intf: 0
    destination: R2
    dst_intf: 0
    
